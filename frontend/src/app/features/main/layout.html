<div class="drawer h-screen w-screen overflow-hidden">
  <input id="my-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content flex flex-col h-full min-h-0">
    <nav class="navbar w-full bg-base-300 shrink-0 shadow-md">
      <div class="flex-none">
        <label for="my-drawer" class="btn btn-square btn-ghost">
          <span class="material-symbols-outlined">menu</span>
        </label>
      </div>
      <div class="flex-1 px-4 font-bold">Pasanaku</div>
    </nav>

    <main class="flex-1 overflow-y-auto bg-base-100 min-h-0">
      <router-outlet />
    </main>
  </div>

  <div class="drawer-side z-30">
    <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"></label>

    <ul class="menu p-4 w-80 min-h-full bg-base-200 text-base-content shadow-xl gap-1">
      <li class="menu-title text-lg font-bold mb-4 flex flex-row items-center gap-2">
        Menú Principal
      </li>
      @for (item of menuNav; track item.name) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active">
            <span class="material-symbols-outlined">{{ item.icon }}</span>
            <span>{{ item.name }}</span>
          </a>
        </li>
      }
    </ul>
  </div>
</div>
