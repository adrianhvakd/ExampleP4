<div class="p-6 max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-6">Nuevo Usuario</h1>

  <form (ngSubmit)="onSubmit()" class="fieldset bg-base-200 border-base-300 rounded-box border p-6">
    @if (error()) {
      <div class="alert alert-error mb-4">{{ error() }}</div>
    }

    <label class="label">Nombre *</label>
    <input [(ngModel)]="nombre" type="text" class="input w-full" placeholder="Nombre completo" name="nombre" required />

    <label class="label mt-3">Username *</label>
    <input [(ngModel)]="username" type="text" class="input w-full" placeholder="nombre_usuario" name="username" required />

    <label class="label mt-3">Contraseña *</label>
    <input [(ngModel)]="password" type="password" class="input w-full" placeholder="mín. 4 caracteres" name="password" required minlength="4" />

    <label class="label mt-3">Email</label>
    <input [(ngModel)]="email" type="email" class="input w-full" placeholder="correo@ejemplo.com" name="email" />

    <label class="label mt-3">Teléfono</label>
    <input [(ngModel)]="telefono" type="text" class="input w-full" placeholder="+591 70000000" name="telefono" />

    <div class="flex gap-3 mt-6">
      <button type="submit" [disabled]="saving()" class="btn btn-neutral flex-1">
        @if (saving()) { <span class="loading loading-spinner"></span> }
        Crear Usuario
      </button>
      <button type="button" (click)="cancelar()" class="btn btn-ghost">Cancelar</button>
    </div>
  </form>
</div>
